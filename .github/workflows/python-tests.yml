name: Python Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.8', '3.9', '3.10', '3.11']

    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v2
      with:
        python-version: ${{ matrix.python-version }}
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Lint with flake8
      run: |
        pip install flake8
        # Stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        # Exit-zero treats all errors as warnings
        flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Test imports
      run: |
        python -c "from modules.dns_enum import run_dns_enum; print('✓ DNS module OK')"
        python -c "from modules.whois_lookup import run_whois; print('✓ WHOIS module OK')"
        python -c "from modules.port_scan import run_port_scan; print('✓ Port scan module OK')"
        python -c "from modules.subdomain import run_subdomain_discovery; print('✓ Subdomain module OK')"
        python -c "from modules.email_harvest import run_email_harvest; print('✓ Email harvest module OK')"
        python -c "from modules.http_fingerprint import run_http_fingerprint; print('✓ HTTP fingerprint module OK')"

  code-quality:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v2
    
    - name: Set up Python
      uses: actions/setup-python@v2
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pylint bandit
    
    - name: Run bandit for security
      run: |
        bandit -r . -ll --skip B101 || true
